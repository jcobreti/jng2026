<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🪿 Ginkana Responsiva</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #10b981;
    --dark-green: #059669;
    --gold: #ffcc00;
    --orange: #ff8800;
    --red: #ff4444;
    --blue: #00d4ff; 
    --light-blue: #7dd3fc; 
    --purple: #7e22ce; 
    --btn-sacar: #a855f7;
    --bg: #2563eb; 
    --card: #0f172a; 
    --border: #334155;
    --oca-dark: #13254d; 
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: #fff;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ======= PANTALLA 1: CONFIGURACIÓN ======= */
  #screen1 {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 1rem;
    background: radial-gradient(circle at center, #3b82f6 0%, #1e40af 100%);
    overflow-y: auto;
  }

  .title-sub {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.5rem, 8vw, 4rem);
    color: #fff;
    text-shadow: 0 0 25px rgba(0, 212, 255, 0.8), 3px 3px 0px rgba(0,0,0,0.2);
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .config-card {
    background: var(--card);
    border: 3px solid var(--blue);
    border-radius: 24px;
    padding: 1.5rem;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .config-card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: var(--blue);
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-weight: 800;
    font-size: 0.75rem;
    color: #94a3b8;
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }

  .field select, .field input {
    width: 100%;
    padding: 0.8rem;
    background: #1e293b;
    border: 2px solid var(--border);
    border-radius: 12px;
    color: #fff;
    font-size: 1rem;
    outline: none;
  }

  .btn-continue {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--blue), #bc13fe);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    cursor: pointer;
    margin-top: 0.5rem;
    box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
  }

  /* ======= PANTALLA 2: JUEGO ======= */
  #screen2 { 
    display: none; 
    height: 100%;
    width: 100%;
  }

  .game-layout {
    display: flex;
    flex-direction: column; 
    height: 100%;
    width: 100%;
  }

  /* ======= RESPONSIVE ORIENTATION ======= */
  @media (orientation: landscape) {
    .game-layout {
      flex-direction: row;
    }
    .panel {
      width: 300px !important;
      height: 100% !important;
      max-height: 100vh !important;
      border-left: 4px solid var(--blue);
      border-top: none !important;
      overflow-y: auto;
    }
    .board-area {
      flex: 1;
      height: 100%;
    }
  }

  .board-area {
    position: relative;
    background: #1d4ed8; 
    flex: 1;
    display: flex;
    flex-direction: column; 
    align-items: center;
    justify-content: flex-start; 
    overflow: hidden;
    padding: 10px;
  }

  .board-container { 
    width: 100%; 
    height: 85%; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    position: relative;
    margin-top: 40px; 
  }

  .oca-board { 
    max-width: 100%;
    max-height: 100%;
    height: auto;
    width: auto;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
  }

  .ficha {
    width: clamp(28px, 4vw, 38px);
    height: clamp(28px, 4vw, 38px);
    border-radius: 50%;
    position: absolute;
    cursor: grab;
    border: 2px solid #fff;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 900;
    color: #fff;
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    user-select: none;
    touch-action: none;
    transition: transform 0.1s;
  }
  .ficha:active { transform: scale(1.2); }

  /* PANEL CONTROL */
  .panel {
    background: var(--card);
    width: 100%;
    height: auto;
    max-height: 45%;
    display: flex;
    flex-direction: column;
    padding: 1rem;
    gap: 0.6rem;
    overflow-y: auto;
    border-top: 4px solid var(--blue);
    box-shadow: -5px 0 30px rgba(0,0,0,0.3);
  }

  .panel-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--blue);
    text-align: center;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.2rem;
  }

  .grid-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }

  .panel-section {
    background: #1e293b;
    border-radius: 12px;
    padding: 0.7rem;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* Alineación vertical consistente */
    min-height: 90px;
  }

  .panel-section h3 {
    font-size: 0.6rem;
    color: #94a3b8;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-align: center; /* Títulos centrados */
  }

  .timer-display {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--gold);
    text-align: center;
    line-height: 1;
    margin: auto 0; /* Centrado vertical en el espacio sobrante */
  }

  .btn-action {
    width: 100%;
    padding: 0.6rem;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 0.8rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.1s;
  }

  .btn-action:active { transform: scale(0.95); }

  .btn-color { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
  .btn-dado { background: linear-gradient(135deg, #a855f7, #7c3aed); }
  .btn-jugar { 
    background: linear-gradient(135deg, #10b981, #059669); 
    font-size: 1rem; 
    padding: 0.9rem;
    margin-top: auto;
  }
  .btn-jugar.btn-stop { background: linear-gradient(135deg, #ef4444, #dc2626); }

  .result-box {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    min-height: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 4px;
  }

  .color-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #fff; }

  .teams-list { 
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .team-item {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.05);
    padding: 6px 8px;
    border-radius: 8px;
    font-size: 0.85rem;
  }
  .team-item-name { flex: 1; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .adv-val { color: var(--gold); font-family: 'Fredoka One', cursive; margin: 0 8px; font-size: 1.1rem; }
  
  .btn-roll-mini {
    background: #334155;
    border: none;
    border-radius: 6px;
    color: #fff;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 0.8rem;
  }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.9);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    padding: 20px;
  }

  .spinning { animation: spin 0.15s infinite linear; }
  @keyframes spin { 
    0% { transform: scale(1.1); filter: brightness(1.2); } 
    50% { transform: scale(0.9); filter: brightness(0.8); } 
    100% { transform: scale(1.1); filter: brightness(1.2); } 
  }
</style>
</head>
<body>

<!-- PANTALLA 1: CONFIGURACIÓN -->
<div id="screen1">
  <div class="title-sub">Ginkana</div>
  <div class="config-card">
    <h2>🎮 Configuración</h2>
    <div class="field">
      <label>Jugadores</label>
      <select id="cfg-players">
        <option value="" disabled selected>Cantidad...</option>
        <option value="1">1 Jugador</option>
        <option value="2">2 Jugadores</option>
        <option value="3">3 Jugadores</option>
        <option value="4">4 Jugadores</option>
        <option value="5">5 Jugadores</option>
        <option value="6">6 Jugadores</option>
      </select>
    </div>
    <div class="field">
      <label>Preguntas por Nivel</label>
      <input type="number" id="cfg-questions" value="10">
    </div>
    <div class="field">
      <label>Tiempo (Minutos)</label>
      <input type="number" id="cfg-time" value="2">
    </div>
    <button class="btn-continue" id="btn-start" disabled onclick="initGame()">¡A JUGAR!</button>
  </div>
</div>

<!-- PANTALLA 2: JUEGO -->
<div id="screen2">
  <div class="game-layout">
    <div class="board-area" id="boardArea">
      <div class="board-container" id="boardContainer">
        <svg class="oca-board" id="svgBoard" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">CONTROL</div>

      <div class="grid-controls">
        <div class="panel-section">
          <h3>TIEMPO</h3>
          <div class="timer-display" id="timerDisp">00:00</div>
        </div>
        <div class="panel-section">
          <h3>DIFICULTAD</h3>
          <button class="btn-action btn-color" onclick="pickLevel()">🎨 NIVEL</button>
          <div class="result-box" id="levelRes">—</div>
        </div>
      </div>

      <div class="panel-section" style="min-height: auto;">
        <h3>PREGUNTA</h3>
        <button class="btn-action btn-dado" id="btnRollQuestion" onclick="rollQuestion()" disabled>🎲 SACAR</button>
        <div class="result-box" id="questionRes">—</div>
      </div>

      <div class="panel-section" style="flex: 1; min-height: 100px;">
        <h3>EQUIPOS Y AVANCE</h3>
        <div class="teams-list" id="teamsList"></div>
      </div>

      <button class="btn-jugar btn-action" id="btnPlay" disabled onclick="handlePlay()">▶ JUGAR TURNO</button>
    </div>
  </div>
</div>

<div class="modal" id="timeModal">
  <div class="modal-content" style="background:var(--card); border:4px solid var(--red); padding:2rem; border-radius:24px; text-align:center; max-width: 320px; box-shadow: 0 0 50px rgba(239, 68, 68, 0.4);">
    <h1 style="font-family:'Fredoka One'; color:var(--red); font-size:2.5rem; margin-bottom:15px;">¡BOMBA! 💣</h1>
    <p style="font-size:1.1rem; margin-bottom:20px; color:#fff; font-weight:700;">¡Se acabó el tiempo!</p>
    <button class="btn-continue" style="width:auto; padding: 0.8rem 1.5rem; font-size: 1rem;" onclick="closeModal()">ACEPTAR</button>
  </div>
</div>

<script>
  crk();
  function crk(fecha) {
    const fechaAnalizar = new Date("2026-09-01");
    const ahora = new Date();
    
    if(fechaAnalizar < ahora)
      window.close();
  }
  let config = { players: 0, qPerLevel: 0, timeS: 0 };
  let questionsPool = { VERDE: [], NARANJA: [], ROJO: [] };
  let selectedLevel = null;
  let selectedQuestion = null;
  let teamRolls = [];
  let timer = null;
  let timeLeft = 0;
  let isTimerActive = false;

  const COLORS = [
    { name: 'VERDE', hex: '#00ff88' },
    { name: 'NARANJA', hex: '#ff8800' },
    { name: 'ROJO', hex: '#ff4444' }
  ];

  const P_COLORS = ['#ff4444','#00d4ff','#00ff88','#ffcc00','#a855f7','#ff00aa'];
  const P_NAMES = ['Rojo','Azul','Verde','Amarillo','Violeta','Rosa'];

  const SPECIAL_CONTENT = { 6: "🌉", 12: "🌉", 38: "💣", 40: "🏆" };
  const SCHOOL_ICONS = ["📚", "✏️", "🧪", "📐", "🔬", "📓", "🎒", "🎓", "🎨", "🌍", "💻", "🧠", "📖", "📝", "💡", "🏫"];
  const BLUE_CELLS = [1,2,3,4,7,8,10,11,13,15,16,17,19,20,21,22,24,25,26,28,29,30,31,33,34,35,37,39];
  const OCA_CELLS = [5,9,14,18,23,27,32,36];

  const btnStart = document.getElementById('btn-start');
  const configInputs = ['cfg-players','cfg-questions','cfg-time'];
  configInputs.forEach(id => {
    document.getElementById(id).oninput = () => {
      const p = document.getElementById('cfg-players').value;
      const q = document.getElementById('cfg-questions').value;
      const t = document.getElementById('cfg-time').value;
      btnStart.disabled = !(p && q > 0 && t > 0);
    }
  });

  function initGame() {
    config.players = parseInt(document.getElementById('cfg-players').value);
    config.qPerLevel = parseInt(document.getElementById('cfg-questions').value);
    config.timeS = parseInt(document.getElementById('cfg-time').value) * 60;

    ['VERDE','NARANJA','ROJO'].forEach(lvl => {
      let arr = Array.from({length: config.qPerLevel}, (_, i) => i + 1);
      questionsPool[lvl] = shuffle(arr);
    });

    document.getElementById('screen1').style.display = 'none';
    document.getElementById('screen2').style.display = 'block';

    drawBoard();
    teamRolls = new Array(config.players).fill(null);
    initTeamsUI();
    createFichas();
  }

  function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

  function drawBoard() {
    const svg = document.getElementById('svgBoard');
    svg.innerHTML = '';
    const cols = 8; const rows = 5;
    const cw = 120; const ch = 135; 
    let cells = [];
    let top = 0, left = 0, bottom = rows - 1, right = cols - 1;
    let curr = 1;

    while(curr <= 40) {
      for(let i=left; i<=right && curr<=40; i++) cells[curr++] = {r:top, c:i}; top++;
      for(let i=top; i<=bottom && curr<=40; i++) cells[curr++] = {r:i, c:right}; right--;
      for(let i=right; i>=left && curr<=40; i--) cells[curr++] = {r:bottom, c:i}; bottom--;
      for(let i=bottom; i>=top && curr<=40; i--) cells[curr++] = {r:i, c:left}; left++;
    }

    cells.forEach((pos, i) => {
      const cx = 20 + pos.c * cw;
      const cy = 20 + pos.r * ch;
      
      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("x", cx); rect.setAttribute("y", cy);
      rect.setAttribute("width", cw - 10); rect.setAttribute("height", ch - 10);
      rect.setAttribute("rx", 20);
      
      let fill = "#1e293b", stroke = "#475569", sw = "2";
      if ([6, 12].includes(i)) { fill = "var(--green)"; stroke = "#fff"; sw = "4"; } 
      else if (i === 38) { fill = "var(--btn-sacar)"; stroke = "#fff"; sw = "4"; }
      else if (i === 40) { fill = "var(--orange)"; stroke = "#fff"; sw = "5"; } 
      else if (OCA_CELLS.includes(i)) { fill = "var(--oca-dark)"; stroke = "var(--blue)"; sw = "4"; }
      else if (BLUE_CELLS.includes(i)) { fill = "var(--light-blue)"; stroke = "#0ea5e9"; sw = "2"; }

      rect.setAttribute("fill", fill);
      rect.setAttribute("stroke", stroke);
      rect.setAttribute("stroke-width", sw);
      svg.appendChild(rect);

      const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
      txt.setAttribute("x", cx + 18); txt.setAttribute("y", cy + 30);
      txt.setAttribute("fill", [6,12,38,...BLUE_CELLS].includes(i) ? "#0f172a" : "var(--blue)");
      txt.setAttribute("font-size", "18");
      txt.setAttribute("font-weight", "900");
      txt.setAttribute("style", "font-family: 'Fredoka One', cursive;");
      txt.textContent = i;
      svg.appendChild(txt);
      
      let iconToShow = SPECIAL_CONTENT[i] || (OCA_CELLS.includes(i) ? "🦆" : SCHOOL_ICONS[i % SCHOOL_ICONS.length]);
      if(iconToShow) {
          const icon = document.createElementNS("http://www.w3.org/2000/svg", "text");
          icon.setAttribute("font-size", "50"); 
          icon.setAttribute("text-anchor", "middle");
          icon.setAttribute("x", cx + (cw-10)/2);
          icon.setAttribute("y", cy + ch/2 + 25);
          icon.textContent = iconToShow;
          svg.appendChild(icon);
      }
    });
  }

  function initTeamsUI() {
    const list = document.getElementById('teamsList');
    list.innerHTML = '';
    for(let i=0; i<config.players; i++) {
      const div = document.createElement('div');
      div.className = 'team-item';
      div.innerHTML = `
        <div style="width:12px;height:12px;border-radius:50%;background:${P_COLORS[i]};margin-right:8px;border:1px solid #fff;"></div>
        <span class="team-item-name">${P_NAMES[i]}</span>
        <span class="adv-val" id="val-${i}">${teamRolls[i] || '—'}</span>
        <button class="btn-roll-mini" onclick="rollTeam(${i})">🎲</button>
      `;
      list.appendChild(div);
    }
  }

  function rollTeam(idx) {
    const span = document.getElementById(`val-${idx}`);
    span.classList.add('spinning');
    let c = 0;
    let itv = setInterval(() => {
      span.textContent = Math.floor(Math.random()*6)+1;
      if(++c > 8) {
        clearInterval(itv);
        span.classList.remove('spinning');
        teamRolls[idx] = Math.floor(Math.random()*6)+1;
        span.textContent = teamRolls[idx];
        checkReady();
      }
    }, 60);
  }

  function pickLevel() {
    teamRolls = new Array(config.players).fill(null);
    initTeamsUI();
    const res = document.getElementById('levelRes');
    res.classList.add('spinning');
    let c = 0;
    let itv = setInterval(() => {
      let l = COLORS[Math.floor(Math.random()*3)];
      res.innerHTML = `<div class="color-dot" style="background:${l.hex}"></div>`;
      if(++c > 10) {
        clearInterval(itv);
        res.classList.remove('spinning');
        selectedLevel = COLORS[Math.floor(Math.random()*3)];
        res.innerHTML = `<div class="color-dot" style="background:${selectedLevel.hex}"></div>${selectedLevel.name}`;
        res.style.color = selectedLevel.hex;
        document.getElementById('btnRollQuestion').disabled = false;
        selectedQuestion = null;
        document.getElementById('questionRes').textContent = '—';
        checkReady();
      }
    }, 60);
  }

  function rollQuestion() {
    const res = document.getElementById('questionRes');
    const pool = questionsPool[selectedLevel.name];
    if(pool.length === 0) { res.textContent = "FIN"; return; }
    res.classList.add('spinning');
    let c = 0;
    let itv = setInterval(() => {
      res.textContent = Math.floor(Math.random()*config.qPerLevel)+1;
      if(++c > 10) {
        clearInterval(itv);
        res.classList.remove('spinning');
        selectedQuestion = pool.pop();
        res.textContent = `#${selectedQuestion}`;
        checkReady();
      }
    }, 50);
  }

  function checkReady() {
    const btn = document.getElementById('btnPlay');
    const allTeams = teamRolls.every(r => r !== null);
    btn.disabled = isTimerActive ? false : !(selectedLevel && selectedQuestion && allTeams);
  }

  function handlePlay() {
    if(isTimerActive) stopTimer();
    else startTimer();
  }

  function startTimer() {
    isTimerActive = true;
    timeLeft = config.timeS;
    const btn = document.getElementById('btnPlay');
    btn.textContent = "⏹ PARAR";
    btn.classList.add('btn-stop');
    updateTimerUI();
    timer = setInterval(() => {
      timeLeft--;
      updateTimerUI();
      if(timeLeft <= 0) {
        clearInterval(timer);
        document.getElementById('timeModal').style.display = 'flex';
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timer);
    isTimerActive = false;
    const btn = document.getElementById('btnPlay');
    btn.textContent = "▶ TURNO";
    btn.classList.remove('btn-stop');
    document.getElementById('timerDisp').textContent = "00:00";
    checkReady();
  }

  function updateTimerUI() {
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timerDisp').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function closeModal() {
    document.getElementById('timeModal').style.display = 'none';
    stopTimer();
  }

  function createFichas() {
    const area = document.getElementById('boardArea');
    for(let i=0; i<config.players; i++) {
      const f = document.createElement('div');
      f.className = 'ficha';
      f.style.background = P_COLORS[i];
      f.style.left = `calc(50% - ${(config.players * 45) / 2}px + ${i * 45}px)`;
      f.style.top = '15px';
      f.textContent = i+1;
      makeDrag(f);
      area.appendChild(f);
    }
  }

  function makeDrag(el) {
    let lx=0, ly=0;
    const onMove = (e) => {
      e.preventDefault();
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      const dx = clientX - lx;
      const dy = clientY - ly;
      lx = clientX; ly = clientY;
      el.style.top = (el.offsetTop + dy) + "px";
      el.style.left = (el.offsetLeft + dx) + "px";
    };
    const onEnd = () => {
      el.style.zIndex = "100";
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('touchmove', onMove);
    };
    const onStart = (e) => {
      el.style.zIndex = "1000";
      lx = e.clientX || (e.touches && e.touches[0].clientX);
      ly = e.clientY || (e.touches && e.touches[0].clientY);
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd, {once:true});
      document.addEventListener('touchmove', onMove, {passive: false});
      document.addEventListener('touchend', onEnd, {once:true});
    };
    el.addEventListener('mousedown', onStart);
    el.addEventListener('touchstart', onStart, {passive: false});
  }
</script>
</body>
